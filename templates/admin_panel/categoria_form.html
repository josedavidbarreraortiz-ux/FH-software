{% extends 'base_admin.html' %}
{% block title %}{{ titulo }} - Admin{% endblock %}
{% block content %}
<div class="admin-header">
    <h1><i class="fas fa-tags" style="color:var(--accent)"></i> {{ titulo }}</h1>
    <a href="/panel/categorias/" class="btn-outline-fh"><i class="fas fa-arrow-left"></i> Volver</a>
</div>
<div class="card-fh" style="max-width:600px">
    <div class="card-body" style="padding:2rem">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label-fh">Nombre</label>
                <input type="text" name="nombre" class="form-control-fh"
                    value="{{ categoria.categoria_nombre|default:'' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label-fh">Descripción</label>
                <input type="text" name="descripcion" class="form-control-fh"
                    value="{{ categoria.descripcion|default:'' }}">
            </div>
            <div class="form-group">
                <label class="form-label-fh">Estado</label>
                <select name="estado" class="form-control-fh form-select-fh">
                    <option value="1" {% if categoria.estado == 1 %}selected{% endif %}>Activo</option>
                    <option value="0" {% if categoria.estado == 0 %}selected{% endif %}>Inactivo</option>
                </select>
            </div>
            <button type="submit" class="btn-primary-fh"><i class="fas fa-save"></i> Guardar</button>
        </form>
    </div>
</div>
{% endblock %}
